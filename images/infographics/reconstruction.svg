<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" style="max-width:100%;font-family:system-ui,sans-serif">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>
.box-purple{fill:#EEEDFE;stroke:#7F77DD;stroke-width:0.5}
.box-blue{fill:#E6F1FB;stroke:#378ADD;stroke-width:0.5}
.box-teal{fill:#E1F5EE;stroke:#1D9E75;stroke-width:0.5}
.box-green{fill:#EAF3DE;stroke:#639922;stroke-width:0.5}
.box-gray{fill:#F1EFE8;stroke:#888780;stroke-width:0.5}
.tp{font-size:14px;font-weight:600;fill:#3C3489}
.tps{font-size:12px;fill:#534AB7}
.tb2{font-size:14px;font-weight:600;fill:#0C447C}
.tbs{font-size:12px;fill:#185FA5}
.tg{font-size:14px;font-weight:600;fill:#0F6E56}
.tgs{font-size:12px;fill:#0F6E56}
.tgb{font-size:14px;font-weight:600;fill:#27500A}
.tn{font-size:12px;fill:#5F5E5A}
</style>
<rect x="240" y="20" width="200" height="52" rx="8" class="box-purple"/>
<text class="tp" x="340" y="40" text-anchor="middle" dominant-baseline="central">Damage documentation</text>
<text class="tps" x="340" y="58" text-anchor="middle" dominant-baseline="central">Photos, moisture data, scope</text>
<line x1="340" y1="72" x2="340" y2="100" stroke="#7F77DD" marker-end="url(#arr)"/>
<rect x="240" y="100" width="200" height="52" rx="8" class="box-purple"/>
<text class="tp" x="340" y="120" text-anchor="middle" dominant-baseline="central">Xactimate estimate</text>
<text class="tps" x="340" y="138" text-anchor="middle" dominant-baseline="central">Insurance-standard line items</text>
<line x1="340" y1="152" x2="340" y2="180" stroke="#378ADD" marker-end="url(#arr)"/>
<rect x="240" y="180" width="200" height="52" rx="8" class="box-blue"/>
<text class="tb2" x="340" y="200" text-anchor="middle" dominant-baseline="central">Insurance approval</text>
<text class="tbs" x="340" y="218" text-anchor="middle" dominant-baseline="central">Adjuster coordination</text>
<line x1="340" y1="232" x2="340" y2="260" stroke="#378ADD" marker-end="url(#arr)"/>
<rect x="240" y="260" width="200" height="52" rx="8" class="box-blue"/>
<text class="tb2" x="340" y="280" text-anchor="middle" dominant-baseline="central">Demolition + prep</text>
<text class="tbs" x="340" y="298" text-anchor="middle" dominant-baseline="central">Remove damaged materials</text>
<line x1="340" y1="312" x2="340" y2="340" stroke="#1D9E75" marker-end="url(#arr)"/>
<rect x="240" y="340" width="200" height="52" rx="8" class="box-teal"/>
<text class="tg" x="340" y="360" text-anchor="middle" dominant-baseline="central">Reconstruction</text>
<text class="tgs" x="340" y="378" text-anchor="middle" dominant-baseline="central">Framing, drywall, finishes</text>
<line x1="340" y1="392" x2="340" y2="420" stroke="#639922" marker-end="url(#arr)"/>
<rect x="240" y="420" width="200" height="52" rx="8" class="box-green"/>
<text class="tgb" x="340" y="440" text-anchor="middle" dominant-baseline="central">Final walkthrough</text>
<text class="tgb" x="340" y="458" text-anchor="middle" dominant-baseline="central" style="font-weight:400">Pre-loss condition verified</text>
<rect x="490" y="100" width="150" height="52" rx="8" class="box-gray"/>
<text class="tn" x="565" y="120" text-anchor="middle" dominant-baseline="central" style="font-weight:600">Xactimate</text>
<text class="tn" x="565" y="138" text-anchor="middle" dominant-baseline="central">Industry pricing standard</text>
<line x1="440" y1="126" x2="490" y2="126" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text style="font-size:11px;fill:#888780" x="340" y="498" text-anchor="middle">Allied Restoration Company — Xactimate certified — (415) 529-5637</text>
</svg>