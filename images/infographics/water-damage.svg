<rect x="40" y="260" width="150" height="52" rx="8" class="box-gray"/>
<text class="tn" x="115" y="280" text-anchor="middle" dominant-baseline="central" style="font-weight:600">Typical timeline</text>
<text class="tn" x="115" y="298" text-anchor="middle" dominant-baseline="central">3–7 days drying</text>
<line x1="240" y1="286" x2="192" y2="286" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text style="font-size:11px;fill:#888780" x="340" y="498" text-anchor="middle">Allied Restoration Company — IICRC WRT certified — (415) 529-5637</text>
