.tg{font-size:12px;fill:#0F6E56}
.tb{font-size:14px;font-weight:600;fill:#27500A}
.tn{font-size:12px;fill:#5F5E5A}
</style>
<rect x="240" y="20" width="200" height="52" rx="8" class="box-blue"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Emergency call received</text>
<text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">(415) 529-5637 — 24/7</text>
<line x1="340" y1="72" x2="340" y2="100" stroke="#378ADD" stroke-width="1" marker-end="url(#arr)"/>
<rect x="240" y="100" width="200" height="52" rx="8" class="box-blue"/>
<text class="th" x="340" y="122" text-anchor="middle" dominant-baseline="central">60-min on-site response</text>
<text class="ts" x="340" y="140" text-anchor="middle" dominant-baseline="central">Moisture mapping + assessment</text>
<line x1="340" y1="152" x2="340" y2="180" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr)"/>
<rect x="240" y="180" width="200" height="52" rx="8" class="box-teal"/>
<text class="tg" x="340" y="200" text-anchor="middle" dominant-baseline="central" style="font-weight:600">Water extraction</text>
<text class="tg" x="340" y="218" text-anchor="middle" dominant-baseline="central">Truck-mount + portable units</text>
<line x1="340" y1="232" x2="340" y2="260" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr)"/>
<rect x="240" y="260" width="200" height="52" rx="8" class="box-teal"/>
<text class="tg" x="340" y="280" text-anchor="middle" dominant-baseline="central" style="font-weight:600">Structural drying</text>
<text class="tg" x="340" y="298" text-anchor="middle" dominant-baseline="central">LGR dehumidifiers + air movers</text>
<line x1="340" y1="312" x2="340" y2="340" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr)"/>
<rect x="240" y="340" width="200" height="52" rx="8" class="box-teal"/>
<text class="tg" x="340" y="360" text-anchor="middle" dominant-baseline="central" style="font-weight:600">Daily moisture monitoring</text>
<text class="tg" x="340" y="378" text-anchor="middle" dominant-baseline="central">IICRC S500 drying standards</text>
<line x1="340" y1="392" x2="340" y2="420" stroke="#639922" stroke-width="1" marker-end="url(#arr)"/>
<rect x="240" y="420" width="200" height="52" rx="8" class="box-green"/>
