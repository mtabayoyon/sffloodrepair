<line x1="240" y1="126" x2="197" y2="126" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text style="font-size:11px;fill:#888780" x="340" y="498" text-anchor="middle">Allied Restoration Company — IICRC AMRT certified — (415) 529-5637</text>
