.ta{font-size:14px;font-weight:600;fill:#854F0B}
.tas{font-size:12px;fill:#854F0B}
.tb{font-size:14px;font-weight:600;fill:#27500A}
.tr{font-size:12px;fill:#A32D2D}
.tn{font-size:12px;fill:#5F5E5A}
</style>
<rect x="240" y="20" width="200" height="52" rx="8" class="box-teal"/>
<text class="tg" x="340" y="40" text-anchor="middle" dominant-baseline="central">Mold inspection</text>
<text class="tgs" x="340" y="58" text-anchor="middle" dominant-baseline="central">Visual survey + moisture readings</text>
<line x1="340" y1="72" x2="340" y2="100" stroke="#1D9E75" marker-end="url(#arr)"/>
