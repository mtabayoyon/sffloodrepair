<rect x="240" y="260" width="200" height="52" rx="8" class="box-amber"/>
<text class="ta" x="340" y="280" text-anchor="middle" dominant-baseline="central">Remediation</text>
<text class="tas" x="340" y="298" text-anchor="middle" dominant-baseline="central">HEPA vac, removal, treatment</text>
