<text class="tb" x="340" y="458" text-anchor="middle" dominant-baseline="central" style="font-weight:400">Air quality verification</text>
<rect x="40" y="20" width="155" height="52" rx="8" class="box-gray"/>
<text class="tn" x="117" y="40" text-anchor="middle" dominant-baseline="central" style="font-weight:600">Category 3</text>
<text class="tn" x="117" y="58" text-anchor="middle" dominant-baseline="central">Grossly contaminated</text>
<line x1="195" y1="46" x2="240" y2="46" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text style="font-size:11px;fill:#888780" x="340" y="498" text-anchor="middle">Allied Restoration Company — Biohazard certified — (415) 529-5637</text>
</svg>