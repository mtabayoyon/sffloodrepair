<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" style="max-width:100%;font-family:system-ui,sans-serif">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>
.box-coral{fill:#FAECE7;stroke:#D85A30;stroke-width:0.5}
.box-amber{fill:#FAEEDA;stroke:#BA7517;stroke-width:0.5}
.box-teal{fill:#E1F5EE;stroke:#1D9E75;stroke-width:0.5}
.box-green{fill:#EAF3DE;stroke:#639922;stroke-width:0.5}
.box-gray{fill:#F1EFE8;stroke:#888780;stroke-width:0.5}
.tc{font-size:14px;font-weight:600;fill:#712B13}
.tcs{font-size:12px;fill:#993C1D}
.ta{font-size:14px;font-weight:600;fill:#854F0B}
.tas{font-size:12px;fill:#854F0B}
.tg{font-size:14px;font-weight:600;fill:#0F6E56}
.tgs{font-size:12px;fill:#0F6E56}
.tb{font-size:14px;font-weight:600;fill:#27500A}
.tn{font-size:12px;fill:#5F5E5A}
</style>
<rect x="240" y="20" width="200" height="52" rx="8" class="box-coral"/>
<text class="tc" x="340" y="40" text-anchor="middle" dominant-baseline="central">Category 3 assessment</text>
<text class="tcs" x="340" y="58" text-anchor="middle" dominant-baseline="central">Biohazard + contamination scope</text>
<line x1="340" y1="72" x2="340" y2="100" stroke="#D85A30" marker-end="url(#arr)"/>
<rect x="240" y="100" width="200" height="52" rx="8" class="box-coral"/>
<text class="tc" x="340" y="120" text-anchor="middle" dominant-baseline="central">PPE + containment</text>
<text class="tcs" x="340" y="138" text-anchor="middle" dominant-baseline="central">Level B suits, barrier setup</text>
<line x1="340" y1="152" x2="340" y2="180" stroke="#BA7517" marker-end="url(#arr)"/>
<rect x="240" y="180" width="200" height="52" rx="8" class="box-amber"/>
<text class="ta" x="340" y="200" text-anchor="middle" dominant-baseline="central">Sewage extraction</text>
<text class="tas" x="340" y="218" text-anchor="middle" dominant-baseline="central">Pump out + remove solids</text>
<line x1="340" y1="232" x2="340" y2="260" stroke="#BA7517" marker-end="url(#arr)"/>
<rect x="240" y="260" width="200" height="52" rx="8" class="box-amber"/>
<text class="ta" x="340" y="280" text-anchor="middle" dominant-baseline="central">Contaminated material removal</text>
<text class="tas" x="340" y="298" text-anchor="middle" dominant-baseline="central">Flooring, drywall, insulation</text>
<line x1="340" y1="312" x2="340" y2="340" stroke="#1D9E75" marker-end="url(#arr)"/>
<rect x="240" y="340" width="200" height="52" rx="8" class="box-teal"/>
<text class="tg" x="340" y="360" text-anchor="middle" dominant-baseline="central">Antimicrobial treatment</text>
<text class="tgs" x="340" y="378" text-anchor="middle" dominant-baseline="central">EPA-registered disinfectants</text>
<line x1="340" y1="392" x2="340" y2="420" stroke="#639922" marker-end="url(#arr)"/>
<rect x="240" y="420" width="200" height="52" rx="8" class="box-green"/>
